name: Build & Release macOS
run-name: Build & Release macOS

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-15
    outputs:
      artifact-path: ${{ steps.upload.outputs.artifact-path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          architecture: x64

      - name: Select Xcode 16
        run: sudo xcode-select --switch /Applications/Xcode_16.0.app

      - name: Install Dart deps
        run: flutter pub get

      - name: Decode & Install Certificate
        env:
          CERTIFICATE: ${{ secrets.CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE" | base64 --decode > signing_certificate.p12
          security import signing_certificate.p12 \
            -k ~/Library/Keychains/login.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

      - name: Build macOS App
        run: flutter build macos --release

      - name: Create DMG
        run: |
          mkdir -p dist/dmg_contents
          cp -R build/macos/Build/Products/Release/venera.app dist/dmg_contents/
          ln -s /Applications dist/dmg_contents/Applications
          hdiutil create \
            -volname "venera" \
            -srcfolder dist/dmg_contents \
            -ov -format UDZO \
            dist/venera.dmg

      - name: Rename DMG with Version
        run: |
          APP_VERSION=$(grep '^version:' pubspec.yaml | cut -d':' -f2 | tr -d ' ')
          mv dist/venera.dmg venera-${APP_VERSION}.dmg

      - name: Upload DMG Artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: macos_build
          path: venera-*.dmg

  release:
    name: Create Draft Release
    needs: build-macos
    runs-on: ubuntu-22.04
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Download DMG Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos_build
          path: release-assets

      - name: Create Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'v' + steps.upload.outputs.artifact-path }}
          files: release-assets/*.dmg
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
